url: https://rpkgs.datanovia.com/ggpubr/
llm-docs: false

template:
  bootstrap: 5
  params:
    bootswatch: lumen
    ganalytics: G-62JB5GM9C4
    docsearch:
      index_name: ggpubr

reference:
  - title: Plot One Variable - X, Continuous
    desc:  Visualize distributions.
    contents:
      - ggdensity
      - stat_overlay_normal_density
      - gghistogram
      - ggecdf
      - ggqqplot
  - title: Plot Two Variables - X and Y, Discrete X and Continuous Y
    desc: Visualize data distributions by groups.
    contents:
      - ggboxplot
      - ggviolin
      - ggraincloud
      - geom_violin_half
      - ggdotplot
      - ggstripchart
      - ggbarplot
      - ggline
      - ggerrorplot
      - ggpie
      - ggdonutchart
      - ggdotchart
      - ggsummarystats
      - style_summarystats
  - title: Plot Two Continuous Variables
    desc: Scatter plots
    contents:
      - ggscatter
      - stat_cor
      - stat_regline_equation
      - stat_stars
      - ggscatterhist
      - style_scatterhist
  - title: Plot Paired Data
    desc: Paired data
    contents:
      - ggpaired
  - title: Comparing Means and Adding p-values
    contents:
      - ggcompare
      - compare_means
      - stat_compare_means
      - stat_pvalue_manual
      - stat_anova_test
      - stat_kruskal_test
      - stat_welch_anova_test
      - stat_friedman_test
      - stat_cld
      - geom_pwc
      - geom_bracket
      - add_test_label
      - ggadjust_pvalue
  - title: ROC Curves and Diagnostics
    desc: Receiver operating characteristic (ROC) curves with AUC.
    contents:
      - ggrocplot
  - title: Forest and Estimation Plots
    desc: Point estimates with confidence intervals (odds/hazard/risk ratios, coefficients, meta-analysis).
    contents:
      - ggestimates
  - title: P-Value Formatting
    contents:
      - format_p_value
      - create_p_label
      - get_p_format_style
      - list_p_format_styles
  - title: Plot Tables and Paragraphs
    contents:
      - ggtexttable
      - ggparagraph
      - text_grob
  - title: Contingency table
    contents:
      - ggballoonplot
  - title: Genomics
    desc: Plotting data obtained from genomic data analyses.
    contents:
      - ggmaplot
      - ggvolcano
  - title: Themes
    contents:
      - theme_pubr
      - theme_transparent
  - title: Graphical Parameters
    desc: Change graphical parameters such as, titles, legend, colors, axis limits, scale transformation (log, sqrt), axis ticks and plot orientation (vertical, horizontal).
    contents:
      - ggpar
      - show_line_types
      - show_point_shapes
      - font
      - rotate
      - rotate_axis_text
      - set_palette
      - gradient_color
      - border
      - bgcolor
      - rremove
      - grids
      - axis_scale
      - get_breaks
      - get_legend
  - title: Arrange and Export Multiple ggplots
    contents:
      - ggarrange
      - ggexport
      - annotate_figure
      - background_image
  - title: Make Programming Easy with GGPlot2
    contents:
      - geom_exec
      - create_aes
  - title: Coordinates
    contents:
      - as_npc
      - npc_to_data_coord
      - get_coord
  - title: Helpers
    contents:
      - facet
      - add_summary
      - ggadd
      - get_palette
      - as_ggplot
      - ggtext
      - ggpubr_options
      - ggpubr_args
      - clean_lock_files
  - title: Data
    contents:
      - diff_express
      - gene_citation
      - gene_expression
  - title: Others
    contents:
      - desc_statby
      - stat_chull
      - stat_conf_ellipse
      - stat_mean
      - stat_central_tendency
      - reexports

articles:
  - title: Comparing groups
    navbar: Comparisons
    contents:
      - statistical-annotations
      - two-way-comparison
  - title: Diagnostics and estimation
    navbar: Diagnostics & estimation
    contents:
      - roc-curves
      - forest-estimation-plots
  - title: Composing figures
    navbar: Composing figures
    contents:
      - ggpubr-with-patchwork
